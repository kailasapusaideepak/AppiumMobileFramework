# ============================================================
# AppiumMobileFramework - Configuration
# UPDATE these values before running tests
# ============================================================

# --- Device Settings ---
# Run "adb devices" in terminal and paste your device ID below
device.name=emulator-5554
platform.name=Android
platform.version=12.0

# --- Appium Server ---
appium.server.url=http://127.0.0.1:4723

# --- App Under Test ---
# Place your APK in the /apps folder and update the filename
# Download ApiDemos: https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk
app.path=apps/ApiDemos-debug.apk

# For a login-specific app (e.g. Swag Labs / WDIO Demo App):
# app.path=apps/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk
# app.package=com.swaglabsmobileapp
# app.activity=.MainActivity

# ApiDemos package info
app.package=io.appium.android.apis
app.activity=io.appium.android.apis.ApiDemos

# --- Waits ---
implicit.wait.seconds=5
explicit.wait.seconds=10
