name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  appium-android:
    runs-on: ubuntu-latest   # free tier, KVM-capable

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── 3. Node (Appium runs on Node) ────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 4. Appium 2.x + UiAutomator2 driver ─────────────────────────────────
      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      # ── 5. APK (gitignored, so we download it) ───────────────────────────────
      - name: Download ApiDemos APK
        run: |
          mkdir -p apps screenshots
          curl -L -o apps/ApiDemos-debug.apk \
            "https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk"

      # ── 6. KVM acceleration for the emulator ────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 7. Appium server (background, before emulator starts) ────────────────
      - name: Start Appium server
        run: |
          appium --relaxed-security --log appium.log &
          echo "Waiting for Appium to be ready..."
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:4723/status > /dev/null && echo "Appium ready" && break
            sleep 2
          done

      # ── 8. Boot emulator + run tests ─────────────────────────────────────────
      #   api-level 29 (Android 10) + default target: most stable combo on CI runners.
      #   google_apis target is not reliably available on GitHub-hosted runners.
      #   x86_64 + swiftshader_indirect runs without a GPU.
      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          avd-name: test_avd
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml

      # ── 9. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report
          path: reports/ExtentReport.html

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Appium logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore