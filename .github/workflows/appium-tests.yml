name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── 3. Node / Appium ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      # ── 4. APK ────────────────────────────────────────────────────────────
      - name: Download ApiDemos APK
        run: |
          mkdir -p apps screenshots
          curl -L -o apps/ApiDemos-debug.apk \
            "https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk"

      # ── 5. Android SDK system image ───────────────────────────────────────
      - name: Accept SDK licences and install emulator image
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "system-images;android-29;default;x86_64" \
            "platforms;android-29" \
            "emulator"

      # ── 6. AVD ────────────────────────────────────────────────────────────
      - name: Create AVD
        run: |
          echo "no" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager \
            create avd -n test_avd \
            -k "system-images;android-29;default;x86_64" --force

      # ── 7. KVM ────────────────────────────────────────────────────────────
      - name: Enable KVM acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 8. Start emulator ─────────────────────────────────────────────────
      - name: Start Android emulator
        run: |
          nohup $ANDROID_SDK_ROOT/emulator/emulator \
            -avd test_avd \
            -no-snapshot-save -no-window \
            -gpu swiftshader_indirect \
            -noaudio -no-boot-anim \
            -camera-back none > emulator.log 2>&1 &

          echo "Waiting for emulator to boot (up to 5 min)..."
          $ANDROID_SDK_ROOT/platform-tools/adb wait-for-device

          for i in $(seq 1 60); do
            STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            [ "$STATUS" = "1" ] && echo "Emulator booted after $((i*5))s" && break
            sleep 5
          done

          # Unlock screen and disable animations
          adb shell input keyevent 82
          adb shell settings put global window_animation_scale 0.0
          adb shell settings put global transition_animation_scale 0.0
          adb shell settings put global animator_duration_scale 0.0
          adb devices

      # ── 9. Appium server ──────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          appium --relaxed-security --log appium.log &
          echo "Waiting for Appium..."
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:4723/status > /dev/null && echo "Appium ready" && break
            sleep 2
          done

      # ── 10. Tests ─────────────────────────────────────────────────────────
      - name: Run Appium tests
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml

      # ── 11. Artifacts ─────────────────────────────────────────────────────
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report
          path: reports/ExtentReport.html

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Appium log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore

      - name: Upload emulator log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-log
          path: emulator.log
          if-no-files-found: ignore
